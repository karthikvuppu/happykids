version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: happykids_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: happykids
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - happykids_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: happykids_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/happykids
      SECRET_KEY: your-secret-key-change-in-production
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - happykids_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: happykids_web
    command: npm start
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - happykids_network

volumes:
  postgres_data:

networks:
  happykids_network:
    driver: bridge
